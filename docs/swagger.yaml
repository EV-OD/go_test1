basePath: /api/v1
definitions:
  errors.ApiError:
    properties:
      error:
        example: error message
        type: string
    type: object
  errors.ApiSuccess:
    properties:
      message:
        example: success message
        type: string
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  user.AuthResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/user.EUser'
    type: object
  user.EUser:
    properties:
      account_id:
        example: 1001
        type: integer
      balance:
        example: 250.5
        type: number
      createdAt:
        example: "2025-01-15T10:30:00Z"
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      email:
        example: john@example.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
      role:
        example: viewer
        type: string
      updatedAt:
        example: "2025-06-01T14:20:00Z"
        type: string
    type: object
  user.LoadBalanceRequest:
    properties:
      amount:
        example: 100
        type: number
    required:
    - amount
    type: object
  user.LoginRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: mypassword
        type: string
    required:
    - email
    - password
    type: object
  user.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: mypassword
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  user.SendMoneyRequest:
    properties:
      amount:
        example: 50
        type: number
      receiver_account_id:
        example: 1002
        type: integer
    required:
    - amount
    - receiver_account_id
    type: object
  user.UserDTO:
    properties:
      account_id:
        example: 1001
        type: integer
      balance:
        example: 250.5
        type: number
      email:
        example: john@example.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
      role:
        example: viewer
        type: string
    type: object
info:
  contact: {}
  description: This is a simple API server for user management and transactions.
  title: Simple Api
  version: "1.0"
paths:
  /balance/load:
    post:
      consumes:
      - application/json
      description: Add funds to authenticated user's balance
      parameters:
      - description: Load Balance Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.LoadBalanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/errors.ApiSuccess'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/errors.ApiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.ApiError'
      security:
      - BearerAuth: []
      summary: Load balance for user
      tags:
      - Users
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: User Login Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.AuthResponse'
        "400":
          description: Invalid request / Invalid email or password
          schema:
            $ref: '#/definitions/errors.ApiError'
      summary: Login a user
      tags:
      - Auth
  /money/send:
    post:
      consumes:
      - application/json
      description: Transfer funds from authenticated user to a receiver account
      parameters:
      - description: Send Money Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.SendMoneyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/errors.ApiSuccess'
        "400":
          description: Invalid request / insufficient balance
          schema:
            $ref: '#/definitions/errors.ApiError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.ApiError'
      security:
      - BearerAuth: []
      summary: Send money to another account
      tags:
      - Users
  /profile:
    get:
      description: Return profile for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.ApiError'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Users
  /register:
    post:
      consumes:
      - application/json
      description: Create a new user account profile in the system
      parameters:
      - description: User Registration Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/user.AuthResponse'
        "400":
          description: Invalid request / Invalid input data
          schema:
            $ref: '#/definitions/errors.ApiError'
      summary: Register a new user
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
